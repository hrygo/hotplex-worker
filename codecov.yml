codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "40...100"

  # 所有路径统一允许 ±1% 浮动
  status:
    patch:
      default:
        target: 50%
        threshold: 5%
    project:
      default:
        target: 50%
        threshold: 1%
      security:
        target: 85%
        threshold: 1%
        paths:
          - "internal/security/"
      engine:
        target: 75%
        threshold: 1%
        paths:
          - "internal/gateway/"
      protocol:
        target: 85%
        threshold: 1%
        paths:
          - "pkg/aep/"
          - "pkg/events/"
      config:
        target: 70%
        threshold: 1%
        paths:
          - "internal/config/"
      session:
        target: 70%
        threshold: 1%
        paths:
          - "internal/session/"
      worker:
        target: 60%
        threshold: 1%
        paths:
          - "internal/worker/"
      messaging:
        target: 50%
        threshold: 1%
        paths:
          - "internal/messaging/"

parsers:
  gcov:
    branch_discovery: yes

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: no
