codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "40...100"

  status:
    project:
      # Overall project floor (informational, CI uses per-package gates)
      default:
        target: 50%
        threshold: 5%
      # 1. Security core - highest standard
      security:
        target: 85%
        paths:
          - "internal/security/"
      # 2. Core engine (Gateway)
      engine:
        target: 75%
        paths:
          - "internal/gateway/"
      # 3. Protocol (AEP codec + events)
      protocol:
        target: 85%
        paths:
          - "pkg/aep/"
          - "pkg/events/"
      # 4. Config
      config:
        target: 70%
        paths:
          - "internal/config/"
      # 5. Session management
      session:
        target: 70%
        paths:
          - "internal/session/"
      # 6. Worker adapters
      worker:
        target: 60%
        paths:
          - "internal/worker/"
      # 7. Messaging adapters (cloud APIs, subprocess STT)
      messaging:
        target: 50%
        paths:
          - "internal/messaging/"

    patch:
      default:
        target: 60%
        threshold: 5%

parsers:
  gcov:
    branch_discovery: yes

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: no
