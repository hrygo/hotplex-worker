codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      # 整体项目覆盖率目标 (Testing Strategy 5.1 总计)
      default:
        target: 80%
        threshold: 1%
      # 1. 安全核心 (Security) - 最高标准
      security:
        target: 95%
        paths:
          - "internal/security/"
      # 2. 核心引擎 (Gateway/Engine)
      engine:
        target: 90%
        paths:
          - "internal/gateway/"
      # 3. 核心协议 (AEP Protocol)
      protocol:
        target: 90%
        paths:
          - "internal/aep/"
      # 4. 配置中心 (Config)
      config:
        target: 85%
        paths:
          - "internal/config/"
      # 5. 会话管理 (Session)
      session:
        target: 80%
        paths:
          - "internal/session/"
      # 6. 适配器/提供者 (Worker/Providers)
      worker:
        target: 80%
        paths:
          - "internal/worker/"

    patch:
      # 对 Pull Request 中新增/修改代码的覆盖率要求
      default:
        target: 80%
        threshold: 0%

parsers:
  gcov:
    branch_discovery: yes

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: no
