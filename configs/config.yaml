# HotPlex Worker Gateway - Base Configuration
#
# Sensible defaults for both dev and prod. Override via:
#   1. Inheritance: config-dev.yaml / config-prod.yaml (inherits this file)
#   2. Environment variables: HOTPLEX_* (highest priority)
#   3. Secrets provider: JWT secret, admin tokens (never in config files)
#
# Code defaults live in internal/config/config.go:Default().

# ─────────────────────────────────────────────────────────────────────────────
# CORE NETWORK
# ─────────────────────────────────────────────────────────────────────────────

gateway:
  addr: ":8888"
  ping_interval: 54s
  pong_timeout: 60s
  write_timeout: 10s
  idle_timeout: 5m
  max_frame_size: 32768
  broadcast_queue_size: 256

admin:
  enabled: true
  addr: ":9999"
  rate_limit_enabled: true
  requests_per_sec: 10
  burst: 20

# ─────────────────────────────────────────────────────────────────────────────
# DATA
# ─────────────────────────────────────────────────────────────────────────────

db:
  path: "~/.hotplex/data/hotplex.db"
  wal_mode: true
  busy_timeout: 5s
  event_retention: 720h     # 30 days
  vacuum_threshold: 0.2     # VACUUM when 20%+ free pages

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────

security:
  api_key_header: "X-API-Key"
  tls_enabled: false
  tls_cert_file: "/etc/hotplex/tls/server.crt"
  tls_key_file: "/etc/hotplex/tls/server.key"
  allowed_origins:
    - "*"
  jwt_audience: "hotplex-gateway"

# ─────────────────────────────────────────────────────────────────────────────
# SESSION
# ─────────────────────────────────────────────────────────────────────────────

session:
  retention_period: 168h
  gc_scan_interval: 1m
  max_concurrent: 1000
  event_store_enabled: true
  event_store_type: "sqlite"

# ─────────────────────────────────────────────────────────────────────────────
# POOL
# ─────────────────────────────────────────────────────────────────────────────

pool:
  min_size: 0
  max_size: 100
  max_idle_per_user: 5
  max_memory_per_user: 3221225472  # 3GB

# ─────────────────────────────────────────────────────────────────────────────
# WORKER
# ─────────────────────────────────────────────────────────────────────────────

worker:
  max_lifetime: 24h
  idle_timeout: 60m
  execution_timeout: 30m
  turn_timeout: 15m

  auto_retry:
    enabled: true
    max_retries: 9
    base_delay: 5s
    max_delay: 120s
    retry_input: "继续"
    notify_user: true
  claude_code:
    command: claude  # Binary + optional subcommand, e.g. "ccr code"

# ─────────────────────────────────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────────────────────────────────

log:
  level: "info"
  format: "json"

# ─────────────────────────────────────────────────────────────────────────────
# MESSAGING
# ─────────────────────────────────────────────────────────────────────────────

messaging:
  slack:
    enabled: false
    socket_mode: true
    worker_type: "claude_code"
    dm_policy: "allowlist"
    group_policy: "allowlist"
    require_mention: true
    stt_provider: "local"
    stt_local_cmd: "python3 ~/.hotplex/scripts/stt_server.py"
    stt_local_mode: "persistent"
    stt_local_idle_ttl: 1h

  feishu:
    enabled: false
    worker_type: "claude_code"
    dm_policy: "allowlist"
    group_policy: "allowlist"
    require_mention: true
    stt_provider: "feishu+local"
    stt_local_cmd: "python3 ~/.hotplex/scripts/stt_server.py"
    stt_local_mode: "persistent"
    stt_local_idle_ttl: 1h
