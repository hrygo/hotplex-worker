# HotPlex Worker Gateway - Development Configuration
#
# Inherits: config.yaml (base)
# Usage: ./hotplex-worker -config configs/config-dev.yaml
#
# Only fields that differ from base are listed below.

inherits: config.yaml

admin:
  addr: "127.0.0.1:9999"
  rate_limit_enabled: false

gateway:
  addr: "127.0.0.1:8888"

session:
  retention_period: 24h
  max_concurrent: 100

pool:
  max_size: 50
  max_memory_per_user: 4294967296  # 4GB (~8 concurrent workers)

worker:
  idle_timeout: 5m
  execution_timeout: 5m

log:
  level: "info"
  format: "text"

messaging:
  slack:
    enabled: true
  feishu:
    enabled: true
