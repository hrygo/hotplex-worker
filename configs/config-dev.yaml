# HotPlex Worker Gateway - Development Configuration
#
# Inherits: config.yaml (base)
# Usage: ./hotplex -config configs/config-dev.yaml
#
# Only fields that differ from base are listed below.

inherits: config.yaml

admin:
  addr: "127.0.0.1:9999"
  rate_limit_enabled: false

gateway:
  addr: "127.0.0.1:8888"

webchat:
  addr: "127.0.0.1:3000"

session:
  retention_period: 24h
  max_concurrent: 100

pool:
  max_size: 50
  max_memory_per_user: 3221225472  # 3GB (~6 concurrent workers)

worker:
  idle_timeout: 30m
  execution_timeout: 30m

log:
  level: "debug"
  format: "text"

messaging:
  slack:
    enabled: true
  feishu:
    enabled: true
