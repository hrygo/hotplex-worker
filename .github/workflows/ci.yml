name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Layer 1: Fast gates (快关门) ──────────────────────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.64.8
          args: --timeout=10m

  # ── Layer 2: Unit tests (按包并行) ──────────────────────────────────────
  unit-test:
    needs: [gate]
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - internal/aep
          - internal/config
          - internal/gateway
          - internal/messaging
          - internal/messaging/slack
          - internal/messaging/feishu
          - internal/security
          - internal/session
          - internal/worker
          - internal/worker/acpx
          - internal/worker/base
          - internal/worker/claudecode
          - internal/worker/noop
          - internal/worker/opencodecli
          - internal/worker/opencodeserver
          - internal/worker/pi
          - internal/worker/proc
          - pkg/events
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Run unit tests
        run: |
          go test -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./${{ matrix.package }}
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: coverage.out

  # ── Layer 3: Full integration test ───────────────────────────────────────
  integration-test:
    needs: [gate]
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Run all tests with race detector
        run: go test -race -timeout=15m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display total coverage
        run: go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hrygo/hotplex-worker
          files: ./coverage.out
          flags: integration
          name: hotplex-worker-integration
          fail_ci_if_error: false

  # ── Layer 4: Coverage gate ───────────────────────────────────────────────
  coverage-check:
    needs: [unit-test, integration-test]
    name: Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Merge coverage profiles
        run: |
          echo "Checking total coverage from integration profile..."
          TOTAL=$(go tool cover -func=coverage-artifacts/coverage.out 2>/dev/null | tail -1 | grep -oP '\d+\.\d+')
          echo "Total coverage: ${TOTAL}%"
          # Enforce 80% threshold
          PASS=$(echo "$TOTAL >= 80.0" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold."
          fi
          echo "## Coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY

  # ── Build verification ───────────────────────────────────────────────────
  build:
    needs: [gate]
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Build gateway binary
        run: |
          mkdir -p bin
          go build -o bin/hotplex-worker ./cmd/worker

      - name: Verify binary
        run: ./bin/hotplex-worker --help || true
