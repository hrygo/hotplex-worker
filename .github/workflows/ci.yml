name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Gate: fast checks (快关门) ───────────────────────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --timeout=10m

  # ── Test: all packages with race detector ──────────────────────────────
  test:
    needs: [gate]
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Run tests with race detector
        run: go test -race -timeout=15m ./...

      - name: Run tests with coverage
        run: |
          go test -timeout=15m -coverprofile=coverage.out -covermode=atomic \
            $(go list ./... | grep -v \
              -e 'internal/worker/proc' \
              -e 'internal/worker/pi' \
              -e 'cmd/worker' \
              -e 'e2e')

      - name: Display coverage
        run: go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hrygo/hotplex-worker
          files: ./coverage.out
          flags: unittests
          name: hotplex-worker
          fail_ci_if_error: false

  # ── Coverage gate ───────────────────────────────────────────────────────
  coverage-check:
    needs: [test]
    name: Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Download coverage
        uses: actions/download-artifact@v6
        with:
          name: coverage
          path: coverage-artifacts

      - name: Check per-package coverage thresholds
        run: |
          COV_FILE="coverage-artifacts/coverage.out"

          # Per-package thresholds (longest-prefix match wins).
          declare -A THRESHOLDS
          THRESHOLDS["internal/security"]=80
          THRESHOLDS["pkg/events"]=45
          THRESHOLDS["pkg/aep"]=75
          THRESHOLDS["internal/gateway/testutil"]=0
          THRESHOLDS["internal/gateway"]=55
          THRESHOLDS["internal/session"]=70
          THRESHOLDS["internal/config"]=70
          THRESHOLDS["internal/worker/base"]=45
          THRESHOLDS["internal/worker"]=70
          THRESHOLDS["internal/worker/claudecode"]=55
          THRESHOLDS["internal/worker/opencodecli"]=35
          THRESHOLDS["internal/worker/opencodeserver"]=10
          THRESHOLDS["internal/worker/noop"]=80
          THRESHOLDS["internal/messaging/feishu"]=40
          THRESHOLDS["internal/messaging/slack"]=35
          THRESHOLDS["internal/messaging"]=20

          FAILED=0
          echo "## Per-Package Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Coverage | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          # Aggregate per-package coverage from raw profile (statement-weighted).
          declare -A PKG_TOTAL
          declare -A PKG_COVERED

          while IFS= read -r line; do
            [[ "$line" == mode:* ]] && continue
            FILE="${line%%:*}"
            PKG=$(dirname "$FILE")
            NUM_STMTS=$(echo "$line" | awk '{print $(NF-1)}')
            EXEC_COUNT=$(echo "$line" | awk '{print $NF}')
            PKG_TOTAL[$PKG]=$((${PKG_TOTAL[$PKG]:-0} + NUM_STMTS))
            if [ "$EXEC_COUNT" -gt 0 ] 2>/dev/null; then
              PKG_COVERED[$PKG]=$((${PKG_COVERED[$PKG]:-0} + NUM_STMTS))
            fi
          done < "$COV_FILE"

          for PKG in "${!PKG_TOTAL[@]}"; do
            TOTAL=${PKG_TOTAL[$PKG]}
            [ "$TOTAL" -eq 0 ] && continue
            COVERED=${PKG_COVERED[$PKG]:-0}
            COV=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc -l)

            # Find matching threshold (longest prefix match).
            MATCH=""
            for pattern in "${!THRESHOLDS[@]}"; do
              if [[ "$PKG" == *"$pattern"* ]]; then
                if [ -z "$MATCH" ] || [ ${#pattern} -gt ${#MATCH} ]; then
                  MATCH="$pattern"
                fi
              fi
            done

            if [ -n "$MATCH" ]; then
              THRESH=${THRESHOLDS[$MATCH]}
              PASS=$(echo "$COV >= $THRESH" | bc -l)
              if [ "$PASS" -ne 1 ]; then
                STATUS=":x: FAIL"
                FAILED=1
                echo "::error::Package $PKG coverage ${COV}% is below ${THRESH}% threshold."
              else
                STATUS=":white_check_mark: PASS"
              fi
              echo "| \`$PKG\` | ${COV}% | ${THRESH}% | $STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          TOTAL_LINE=$(go tool cover -func="$COV_FILE" 2>/dev/null | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total coverage: ${TOTAL_LINE}%** (informational, not gated)" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more packages are below their coverage thresholds."
            exit 1
          fi
          echo "All package coverage thresholds met."

  # ── Build verification ──────────────────────────────────────────────────
  build:
    needs: [gate]
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Build gateway binary
        run: |
          mkdir -p bin
          go build -o bin/hotplex-worker ./cmd/worker

      - name: Verify binary
        run: test -x ./bin/hotplex-worker && ./bin/hotplex-worker --help
