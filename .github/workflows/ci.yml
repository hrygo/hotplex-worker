name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Gate: fast checks (快关门) ───────────────────────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.64.8
          args: --timeout=10m

  # ── Test: all packages with race detector ──────────────────────────────
  test:
    needs: [gate]
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Run tests with race detector
        run: go test -race -timeout=15m ./...

      - name: Run tests with coverage
        run: go test -timeout=15m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage
        run: go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hrygo/hotplex-worker
          files: ./coverage.out
          flags: unittests
          name: hotplex-worker
          fail_ci_if_error: false

  # ── Coverage gate ───────────────────────────────────────────────────────
  coverage-check:
    needs: [test]
    name: Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage-artifacts

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage-artifacts/coverage.out 2>/dev/null | tail -1 | grep -oP '\d+\.\d+')
          echo "Total coverage: ${TOTAL}%"
          PASS=$(echo "$TOTAL >= 80.0" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold."
            exit 1
          fi
          echo "## Coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY

  # ── Build verification ──────────────────────────────────────────────────
  build:
    needs: [gate]
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Build gateway binary
        run: |
          mkdir -p bin
          go build -o bin/hotplex-worker ./cmd/worker

      - name: Verify binary
        run: test -x ./bin/hotplex-worker && ./bin/hotplex-worker --help
