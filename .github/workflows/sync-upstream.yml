name: Sync Upstream

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if PR already exists"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/hrygo/hotplex.git
          git fetch upstream main

      - name: Check for existing sync PR
        if: github.event.inputs.force != 'true'
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --state open --base main --label upstream-sync --json number --jq '.[].number')
          if [ -n "$EXISTING" ]; then
            echo "existing_pr=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping: open sync PR #${EXISTING} already exists. Use 'Force sync' to override."
          else
            echo "existing_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for upstream changes
        id: changes
        run: |
          COMMITS=$(git log --oneline origin/main..upstream/main)
          if [ -z "$COMMITS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            COMMIT_COUNT=$(echo "$COMMITS" | wc -l)
            echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
            echo "Found $COMMIT_COUNT new commit(s) from upstream."

            # Capture commit list for PR body
            COMMIT_LOG=$(git log --format="* %h %s (%an, %ar)" origin/main..upstream/main)
            echo "commit_log<<COMMITEOF" >> "$GITHUB_OUTPUT"
            echo "$COMMIT_LOG" >> "$GITHUB_OUTPUT"
            echo "COMMITEOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and merge
        if: steps.changes.outputs.has_changes == 'true' && (steps.check-pr.outputs.existing_pr != 'true' || github.event.inputs.force == 'true')
        id: create-sync-branch
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"

          # Remove old local branch if exists
          git branch -D "$BRANCH" 2>/dev/null || true
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH" origin/main

          # Attempt merge
          MERGE_STATUS=0
          git merge upstream/main --no-edit || MERGE_STATUS=$?

          if [ "$MERGE_STATUS" -ne 0 ]; then
            echo "merge_conflicts=true" >> "$GITHUB_ENV"
            # Abort merge, just copy upstream changes
            git merge --abort
            # Use upstream version for all files (ours vs theirs strategy)
            git checkout -b "${BRANCH}-force" origin/main
            git merge -s recursive -Xtheirs upstream/main --no-edit || true
          else
            echo "merge_conflicts=false" >> "$GITHUB_ENV"
          fi

          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.create-sync-branch.outputs.branch }}
          COMMIT_LOG: ${{ steps.changes.outputs.commit_log }}
          COMMIT_COUNT: ${{ steps.changes.outputs.commit_count }}
        run: |
          if [ "$BRANCH" = "" ]; then
            echo "No sync branch created."
            exit 0
          fi

          TITLE="chore: sync upstream updates ($(date +%Y-%m-%d))"

          BODY="## Summary

          Synced **${COMMIT_COUNT} commit(s)** from \`hrygo/hotplex\` upstream.

          <details>
          <summary>Commits</summary>

          ${COMMIT_LOG}

          </details>"

          if [ "$merge_conflicts" = "true" ]; then
            BODY="${BODY}

          > [!WARNING]
          > This PR has merge conflicts that need to be resolved manually."
          fi

          BODY="${BODY}

          ---
          *Created by [Sync Upstream](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})*"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY" \
            --label upstream-sync)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR created: $PR_URL"

      - name: Report
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "false" ]; then
            echo "Fork is up to date with upstream."
          elif [ "${{ steps.check-pr.outputs.existing_pr }}" = "true" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "Skipped: existing open sync PR."
          else
            echo "Sync PR created: ${{ steps.create-pr.outputs.pr_url }}"
          fi
