name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  # Build-time variables injected via ldflags
  GO_VERSION: '1.26'

jobs:
  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        os: [darwin, linux]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Compute version
        id: version
        run: |
          REF="${{ github.ref }}"
          TAG="${REF#refs/tags/}"
          VER="${TAG:-dev}"
          if [ "$VER" = "$REF" ]; then VER="${{ github.event.inputs.version || 'dev' }}"; fi
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          LDFLAGS: -s -w
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          NAME="hotplex-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          mkdir -p dist
          go build -ldflags="${LDFLAGS} -X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o "dist/${NAME}" ./cmd/hotplex

      - name: Compute checksum
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          NAME="hotplex-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          sha256sum "dist/${NAME}" >> dist/checksums.txt

      - uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 7

  # ── Release ─────────────────────────────────────────────────────────────
  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v6
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Verify and sort checksums
        run: |
          echo "=== Release artifacts ==="
          ls -lh dist/
          echo ""
          echo "=== Checksums ==="
          sort -k2 dist/checksums.txt
          echo ""
          echo "=== Integrity check ==="
          sha256sum --check <(sort -k2 dist/checksums.txt)

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            dist/hotplex-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
