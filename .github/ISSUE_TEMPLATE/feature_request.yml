name: Feature Request
description: 提出新功能或改进建议
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        描述你需要的功能以及为什么需要它。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 这个功能解决什么问题？目前的限制是什么？
      placeholder: "我在使用时遇到了 ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的解决方案。可包含 API 设计、配置结构或交互细节。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过哪些替代方案？

  - type: dropdown
    id: component
    attributes:
      label: 组件
      options:
        - "-- 请选择 --"
        - Gateway (WebSocket)
        - Worker (Claude Code / OpenCode Server)
        - Messaging (Slack)
        - Messaging (Feishu)
        - Session Management
        - Admin API
        - Configuration
        - STT (Speech-to-Text)
        - Client SDK
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 相关链接、参考资料、原型图或关联 Issue。
