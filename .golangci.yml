version: 2

run:
  timeout: 10m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - unconvert
    - unparam
    - errorlint
    - gocritic

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
  goimports:
    local-prefixes: github.com/hotplex/hotplex-worker
  staticcheck:
    checks: ["all"]
  unparam:
    checks: ["all"]
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - builtinShadow
      - unnamedResult
      - typeDefFirst
      - ifElseChain
      - typeAssertChain

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files: relax noisy linters
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - unparam
        - errorlint
        - govet
    # E2E test files
    - path: e2e/
      linters:
        - errcheck
        - gocritic
        - unparam
        - errorlint
        - govet
